# Single entry point into the cluster. Routes by path:
#   /api/users/*       → user-service
#   /api/products/*    → product-service
#   /api/cart/*        → order-service
#   /api/orders/*      → order-service
#   everything else    → frontend (React SPA)
# This is the cluster-wide replacement for the frontend container's nginx proxy.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudkart-ingress
  namespace: cloudkart
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3000
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3000
          - path: /api/cart
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 3000
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
