name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  security-events: write   # for Trivy SARIF upload to GitHub Security tab

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1) Unit tests per backend service (parallel via matrix)
  # ──────────────────────────────────────────────────────────────
  test-backends:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Run tests with coverage
        run: npm test
        working-directory: services/${{ matrix.service }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 2) Helm chart linting + multi-env template render
  # ──────────────────────────────────────────────────────────────
  lint-helm:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.16.2'

      - name: helm lint
        run: helm lint helm/cloudkart

      - name: helm template (dev / staging / prod)
        run: |
          helm template cloudkart helm/cloudkart -f helm/cloudkart/values-dev.yaml     > /dev/null
          helm template cloudkart helm/cloudkart -f helm/cloudkart/values-staging.yaml > /dev/null
          helm template cloudkart helm/cloudkart -f helm/cloudkart/values-prod.yaml    > /dev/null

  # ──────────────────────────────────────────────────────────────
  # 3) Build, scan, and push container images
  # ──────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build+scan+push (${{ matrix.service }})
    needs: [test-backends]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (only on main, only for push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load into local Docker for scanning)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (CRITICAL/HIGH fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.service }}.sarif

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Push to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # 4) Summary job — never-failing aggregator for branch protection
  # ──────────────────────────────────────────────────────────────
  ci-summary:
    name: CI summary
    needs: [test-backends, lint-helm, build-scan-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "Test:   ${{ needs.test-backends.result }}"
          echo "Helm:   ${{ needs.lint-helm.result }}"
          echo "Build:  ${{ needs.build-scan-push.result }}"
          if [ "${{ needs.test-backends.result }}" != "success" ] || \
             [ "${{ needs.lint-helm.result }}"    != "success" ] || \
             [ "${{ needs.build-scan-push.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed."
