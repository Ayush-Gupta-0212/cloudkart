# Nginx config for the frontend container.
# Serves the React SPA AND reverse-proxies /api/* to the right backend.
# This is exactly the pattern Kubernetes Ingress will use in Phase 2.

worker_processes auto;
events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile          on;
  tcp_nopush        on;
  keepalive_timeout 65;
  server_tokens     off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Resolve service names via Docker's embedded DNS.
  resolver 127.0.0.11 valid=30s;

  upstream user_svc    { server user-service:3000;    }
  upstream product_svc { server product-service:3000; }
  upstream order_svc   { server order-service:3000;   }

  server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache for hashed Vite output, short for index.html
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # API proxies
    location /api/users/ {
      proxy_pass         http://user_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/products {
      proxy_pass         http://product_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/cart {
      proxy_pass         http://order_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    location /api/orders {
      proxy_pass         http://order_svc;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback — any other path returns index.html so React Router (future) works.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
